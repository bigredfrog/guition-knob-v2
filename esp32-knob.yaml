script:
  - id: led_ring_apply_state
    mode: restart
    then:
      - if:
          condition:
            switch.is_off: led_ring_enabled
          then:
            - light.turn_off: rgb_ring
          else:
            - if:
                condition:
                  media_player.is_playing: external_media_player
                then:
                  - light.turn_on:
                      id: rgb_ring
                      brightness: 45%
                      red: 0%
                      green: 100%
                      blue: 0%
                else:
                  - light.turn_on:
                      id: rgb_ring
                      brightness: 28%
                      red: 100%
                      green: 0%
                      blue: 0%

  - id: apply_accent_color_debounced
    mode: restart
    then:
      - delay: 40ms
      - script.execute: apply_accent_color

  - id: apply_accent_color
    mode: restart
    then:
      - lambda: |-
          const int r = std::max(0, std::min(255, id(accent_red)));
          const int g = std::max(0, std::min(255, id(accent_green)));
          const int b = std::max(0, std::min(255, id(accent_blue)));
          const uint32_t accent_u32 = ((uint32_t) r << 16) | ((uint32_t) g << 8) | (uint32_t) b;
          const uint32_t dark_u32 = ((uint32_t) (r / 10) << 16) | ((uint32_t) (g / 10) << 8) | (uint32_t) (b / 10);
          const lv_color_t accent = lv_color_hex(accent_u32);
          const lv_color_t accent_dark = lv_color_hex(dark_u32);

          lv_obj_set_style_text_color(id(clock_label), accent, 0);
          lv_obj_set_style_text_color(id(weather_big_temp), accent, 0);
          lv_obj_set_style_text_color(id(weather_big_temp_unit), accent, 0);
          lv_obj_set_style_bg_color(id(controls_toggle_button), accent, 0);
          lv_obj_set_style_border_color(id(controls_toggle_button), accent, LV_STATE_PRESSED);
          lv_obj_set_style_border_color(id(volume_feedback_box), accent, 0);

          lv_obj_t *playlist_buttons[] = {
            id(playlist_1_button), id(playlist_2_button), id(playlist_3_button),
            id(playlist_4_button), id(playlist_5_button), id(playlist_6_button)
          };
          for (auto *button : playlist_buttons) {
            lv_obj_set_style_bg_color(button, accent_dark, 0);
            lv_obj_set_style_border_color(button, accent, 0);
            lv_obj_set_style_shadow_color(button, accent, 0);
            lv_obj_set_style_bg_color(button, accent, LV_STATE_PRESSED);
          }

  - id: set_ui_phase
    mode: restart
    parameters:
      phase: int
    then:
      - script.stop: player_controls_timeout
      - lambda: |-
          id(ui_phase) = phase;
      - script.execute: standby_screen_activity
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_standby};'
          then:
            - lvgl.page.show: idle_page
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_player_controls};'
          then:
            - lvgl.page.show: player_controls_page
            - script.execute: player_controls_timeout
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_now_playing};'
          then:
            - lvgl.page.show: sendspin_page
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_playlist_menu};'
          then:
            - lvgl.page.show: playlist_menu_page
            - script.execute: player_controls_timeout

  - id: player_controls_timeout
    mode: restart
    then:
      - delay: !lambda |-
          return (uint32_t) (id(player_controls_timeout_seconds).state * 1000.0f);
      - if:
          condition:
            media_player.is_idle: external_media_player
          then:
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_standby}
          else:
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_now_playing}

  - id: open_playlist_menu
    then:
      - script.stop: player_controls_timeout
      - lambda: |-
          id(ui_phase) = ${ui_phase_playlist_menu};
      - lvgl.page.show:
          id: playlist_menu_page
          animation: MOVE_BOTTOM
          time: 160ms
      - script.execute: player_controls_timeout

  - id: close_playlist_menu
    then:
      - script.stop: player_controls_timeout
      - lambda: |-
          id(ui_phase) = ${ui_phase_player_controls};
      - lvgl.page.show:
          id: player_controls_page
          animation: MOVE_TOP
          time: 160ms
      - script.execute: player_controls_timeout

  - id: refresh_playlist_labels
    mode: restart
    then:
      - lvgl.label.update:
          id: playlist_1_label
          text: !lambda return id(playlist_1_name).state;
      - lvgl.label.update:
          id: playlist_2_label
          text: !lambda return id(playlist_2_name).state;
      - lvgl.label.update:
          id: playlist_3_label
          text: !lambda return id(playlist_3_name).state;
      - lvgl.label.update:
          id: playlist_4_label
          text: !lambda return id(playlist_4_name).state;
      - lvgl.label.update:
          id: playlist_5_label
          text: !lambda return id(playlist_5_name).state;
      - lvgl.label.update:
          id: playlist_6_label
          text: !lambda return id(playlist_6_name).state;

  - id: play_playlist
    parameters:
      uri: string
    then:
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected) && !id(playlist_media_player_entity).state.empty() && !uri.empty();'
          then:
            - homeassistant.action:
                action: media_player.play_media
                data:
                  media_content_type: music
                data_template:
                  entity_id: "{{ media_player_entity }}"
                  media_content_id: "{{ media_url }}"
                variables:
                  media_player_entity: |-
                    return id(playlist_media_player_entity).state;
                  media_url: |-
                    return uri;

  - id: load_standby_background
    mode: restart
    then:
      - online_image.set_url:
          id: standby_background_image
          url: !lambda |-
            return "https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Other/360x360/" + id(standby_background_choice).current_option().str() + ".png";

  - id: standby_screen_activity
    mode: restart
    then:
      - script.stop: standby_screen_timeout
      - if:
          condition:
            lambda: 'return id(screen_timeout_dimmed);'
          then:
            - light.turn_on:
                id: Sled
                brightness: !lambda 'return id(preferred_screen_brightness);'
            - lambda: |-
                id(screen_timeout_dimmed) = false;
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
          then:
            - script.execute: standby_screen_timeout

  - id: standby_screen_timeout
    mode: restart
    then:
      - delay: !lambda |-
          return (uint32_t) (id(standby_screen_timeout_seconds).state * 1000.0f / 3.0f);
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
          then:
            - lambda: |-
                id(preferred_screen_brightness) = id(Sled).remote_values.get_brightness();
                id(screen_timeout_dimmed) = true;
            - light.turn_on:
                id: Sled
                brightness: !lambda 'return id(preferred_screen_brightness) * 0.60f;'
          else:
            - script.stop: standby_screen_timeout
      - delay: !lambda |-
          return (uint32_t) (id(standby_screen_timeout_seconds).state * 1000.0f / 3.0f);
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
          then:
            - light.turn_on:
                id: Sled
                brightness: !lambda 'return id(preferred_screen_brightness) * 0.25f;'
          else:
            - script.stop: standby_screen_timeout
      - delay: !lambda |-
          return (uint32_t) (id(standby_screen_timeout_seconds).state * 1000.0f / 3.0f);
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
          then:
            - light.turn_off: Sled

  - id: now_playing_swipe_left
    then:
      - script.execute:
          id: album_art_slide
          direction: -1
      - media_player.next: sendspin_group_media_player

  - id: now_playing_swipe_right
    then:
      - script.execute:
          id: album_art_slide
          direction: 1
      - media_player.previous: sendspin_group_media_player

  - id: now_playing_swipe_up
    then:
      - media_player.volume_up: external_media_player
      - script.execute:
          id: show_volume_feedback
          text: "+5"

  - id: now_playing_swipe_down
    then:
      - media_player.volume_down: external_media_player
      - script.execute:
          id: show_volume_feedback
          text: "-5"

  - id: player_controls_keep_open
    then:
      - script.execute:
          id: set_ui_phase
          phase: ${ui_phase_player_controls}

  - id: player_controls_toggle
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.toggle: sendspin_group_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_previous
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.previous: sendspin_group_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_next
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.next: sendspin_group_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_volume_down
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.volume_down: external_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_volume_up
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.volume_up: external_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_mute
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.mute: external_media_player
            - script.execute: player_controls_keep_open

  - id: album_art_slide
    mode: restart
    parameters:
      direction: int
    then:
      - script.stop: album_art_fade_cleanup
      - lambda: |-
          id(album_art_slide_active) = true;
          id(sendspin_album_art_valid) = false;
          lv_obj_t *current_art = id(album_art_widget);
          lv_obj_t *incoming_art = id(album_art_transition_widget);
          lv_anim_del(current_art, nullptr);
          lv_anim_del(incoming_art, nullptr);
          lv_img_set_src(incoming_art, id(fallback_playing_image));
          lv_obj_set_x(current_art, 0);
          lv_obj_set_x(incoming_art, -direction * ${screenwidth});
          lv_obj_set_style_img_opa(current_art, LV_OPA_COVER, 0);
          lv_obj_set_style_img_opa(incoming_art, LV_OPA_COVER, 0);
          lv_obj_clear_flag(incoming_art, LV_OBJ_FLAG_HIDDEN);

          lv_anim_t current_slide;
          lv_anim_init(&current_slide);
          lv_anim_set_var(&current_slide, current_art);
          lv_anim_set_values(&current_slide, 0, direction * ${screenwidth});
          lv_anim_set_time(&current_slide, 300);
          lv_anim_set_exec_cb(&current_slide, [](void *obj, int32_t x) {
            lv_obj_set_x((lv_obj_t *) obj, x);
          });
          lv_anim_start(&current_slide);

          lv_anim_t incoming_slide;
          lv_anim_init(&incoming_slide);
          lv_anim_set_var(&incoming_slide, incoming_art);
          lv_anim_set_values(&incoming_slide, -direction * ${screenwidth}, 0);
          lv_anim_set_time(&incoming_slide, 300);
          lv_anim_set_exec_cb(&incoming_slide, [](void *obj, int32_t x) {
            lv_obj_set_x((lv_obj_t *) obj, x);
          });
          lv_anim_start(&incoming_slide);
      - delay: 300ms
      - lambda: |-
          lv_obj_t *current_art = id(album_art_widget);
          lv_obj_t *incoming_art = id(album_art_transition_widget);
          lv_img_set_src(current_art, id(fallback_playing_image));
          lv_obj_set_x(current_art, 0);
          lv_obj_set_style_img_opa(current_art, LV_OPA_COVER, 0);
          lv_obj_add_flag(incoming_art, LV_OBJ_FLAG_HIDDEN);
          lv_obj_set_x(incoming_art, 0);
          id(album_art_slide_active) = false;
      - if:
          condition:
            lambda: 'return id(sendspin_album_art_valid);'
          then:
            - script.execute: album_art_apply_decoded

  - id: album_art_apply_decoded
    mode: restart
    then:
      - script.stop: album_art_fade_cleanup
      - lambda: |-
          lv_obj_t *now_playing_art = id(album_art_widget);
          lv_obj_t *transition_art = id(album_art_transition_widget);
          lv_obj_t *controls_art = id(controls_album_art_widget);
          lv_obj_t *playlist_art = id(playlist_album_art_widget);
          lv_img_set_src(controls_art, id(sendspin_album_art));
          lv_img_set_zoom(controls_art, LV_ZOOM_NONE);
          lv_img_set_src(playlist_art, id(sendspin_album_art));
          lv_img_set_zoom(playlist_art, LV_ZOOM_NONE);

          if (id(ui_phase) == ${ui_phase_now_playing}) {
            lv_anim_del(transition_art, nullptr);
            lv_img_set_src(transition_art, id(sendspin_album_art));
            lv_img_set_zoom(transition_art, LV_ZOOM_NONE);
            lv_obj_set_x(transition_art, 0);
            lv_obj_set_style_img_opa(transition_art, LV_OPA_TRANSP, 0);
            lv_obj_clear_flag(transition_art, LV_OBJ_FLAG_HIDDEN);

            lv_anim_t fade_in;
            lv_anim_init(&fade_in);
            lv_anim_set_var(&fade_in, transition_art);
            lv_anim_set_values(&fade_in, LV_OPA_TRANSP, LV_OPA_COVER);
            lv_anim_set_time(&fade_in, 300);
            lv_anim_set_exec_cb(&fade_in, [](void *obj, int32_t opacity) {
              lv_obj_set_style_img_opa((lv_obj_t *) obj, opacity, 0);
            });
            lv_anim_start(&fade_in);
          } else {
            lv_img_set_src(now_playing_art, id(sendspin_album_art));
            lv_img_set_zoom(now_playing_art, LV_ZOOM_NONE);
          }
      - if:
          condition:
            lambda: 'return id(ui_phase) == ${ui_phase_now_playing};'
          then:
            - script.execute: album_art_fade_cleanup

  - id: album_art_fade_cleanup
    mode: restart
    then:
      - delay: 320ms
      - lambda: |-
          lv_obj_t *now_playing_art = id(album_art_widget);
          lv_obj_t *transition_art = id(album_art_transition_widget);
          lv_img_set_src(now_playing_art, id(sendspin_album_art));
          lv_img_set_zoom(now_playing_art, LV_ZOOM_NONE);
          lv_obj_set_x(now_playing_art, 0);
          lv_obj_set_style_img_opa(now_playing_art, LV_OPA_COVER, 0);
          lv_obj_add_flag(transition_art, LV_OBJ_FLAG_HIDDEN);
          lv_obj_set_x(transition_art, 0);

  - id: show_volume_feedback
    mode: restart
    parameters:
      text: string
    then:
      - lambda: |-
          lv_label_set_text(id(volume_feedback_label), text.c_str());
          lv_obj_clear_flag(id(volume_feedback_box), LV_OBJ_FLAG_HIDDEN);
      - delay: 1200ms
      - lambda: |-
          lv_obj_add_flag(id(volume_feedback_box), LV_OBJ_FLAG_HIDDEN);


  - id: haptic_click
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: rotary_haptic_feedback_enabled
          then:
            - lambda: |-
                const uint32_t now = millis();
                if (now - id(haptic_last_ms) < 45) return;
                id(haptic_last_ms) = now;
            - drv2605.play_effect:
                id: haptic_driver
                effect: 7

  - id: show_rotary_volume_feedback
    mode: restart
    then:
      - script.stop: hide_rotary_volume_feedback
      - lambda: |-
          static constexpr int ARC_WIDTH = 24;
          if (id(volume_ring_overlay) == nullptr) {
            id(volume_ring_overlay) = lv_obj_create(lv_layer_top());
            lv_obj_remove_style_all(id(volume_ring_overlay));
            lv_obj_set_size(id(volume_ring_overlay), ${screenwidth}, ${screenheight});
            lv_obj_center(id(volume_ring_overlay));
            lv_obj_clear_flag(id(volume_ring_overlay), LV_OBJ_FLAG_CLICKABLE);
            lv_obj_clear_flag(id(volume_ring_overlay), LV_OBJ_FLAG_SCROLLABLE);

            // Child 0: single arc — MAIN=dark track, INDICATOR=accent fill, KNOB=white dot
            lv_obj_t *arc = lv_arc_create(id(volume_ring_overlay));
            lv_obj_set_size(arc, 330, 330);
            lv_obj_center(arc);
            lv_arc_set_rotation(arc, 270);
            lv_arc_set_bg_angles(arc, 0, 360);
            lv_arc_set_range(arc, 0, 100);
            lv_arc_set_value(arc, 0);
            lv_obj_clear_flag(arc, LV_OBJ_FLAG_CLICKABLE);
            lv_obj_clear_flag(arc, LV_OBJ_FLAG_SCROLLABLE);
            // MAIN: transparent bounding box, dark full-circle track
            lv_obj_set_style_bg_opa(arc, LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_border_opa(arc, LV_OPA_TRANSP, LV_PART_MAIN);
            lv_obj_set_style_pad_all(arc, 0, LV_PART_MAIN);
            lv_obj_set_style_arc_color(arc, lv_color_hex(0x202020), LV_PART_MAIN);
            lv_obj_set_style_arc_width(arc, ARC_WIDTH, LV_PART_MAIN);
            lv_obj_set_style_arc_opa(arc, 150, LV_PART_MAIN);
            // INDICATOR: accent colour, width matches track
            lv_obj_set_style_arc_width(arc, ARC_WIDTH, LV_PART_INDICATOR);
            // KNOB: white circular handle at the end of the indicator
            lv_obj_set_style_bg_color(arc, lv_color_hex(0xFFFFFF), LV_PART_KNOB);
            lv_obj_set_style_bg_opa(arc, LV_OPA_COVER, LV_PART_KNOB);
            lv_obj_set_style_radius(arc, LV_RADIUS_CIRCLE, LV_PART_KNOB);
            lv_obj_set_style_pad_all(arc, 4, LV_PART_KNOB);

            // Child 1: centered percentage label
            id(volume_ring_label) = lv_label_create(id(volume_ring_overlay));
            lv_obj_center(id(volume_ring_label));
            lv_obj_set_style_text_color(id(volume_ring_label), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_text_font(id(volume_ring_label), id(font_boot), 0);
          }

          const float volume = std::max(0.0f, std::min(1.0f, id(external_media_player).volume));
          const int pct = (int) lroundf(volume * 100.0f);

          lv_obj_t *arc = lv_obj_get_child(id(volume_ring_overlay), 0);
          if (arc != nullptr) {
            const uint32_t accent = ((uint32_t)id(accent_red) << 16)
                                  | ((uint32_t)id(accent_green) << 8)
                                  |  (uint32_t)id(accent_blue);
            lv_obj_set_style_arc_color(arc, lv_color_hex(accent), LV_PART_INDICATOR);
            lv_anim_del(arc, nullptr);
            lv_anim_t a;
            lv_anim_init(&a);
            lv_anim_set_var(&a, arc);
            lv_anim_set_values(&a, lv_arc_get_value(arc), pct);
            lv_anim_set_time(&a, 200);
            lv_anim_set_exec_cb(&a, [](void *obj, int32_t val) {
              lv_arc_set_value((lv_obj_t *) obj, (int16_t) val);
            });
            lv_anim_start(&a);
          }

          char text[8];
          snprintf(text, sizeof(text), "%d%%", pct);
          lv_label_set_text(id(volume_ring_label), text);
          lv_obj_set_style_opa(id(volume_ring_overlay), LV_OPA_COVER, 0);
          lv_obj_clear_flag(id(volume_ring_overlay), LV_OBJ_FLAG_HIDDEN);
      - script.execute: hide_rotary_volume_feedback

  - id: hide_rotary_volume_feedback
    mode: restart
    then:
      - delay: 900ms
      - lambda: |-
          if (id(volume_ring_overlay) == nullptr) return;
          lv_anim_del(id(volume_ring_overlay), nullptr);
          lv_anim_t fade;
          lv_anim_init(&fade);
          lv_anim_set_var(&fade, id(volume_ring_overlay));
          lv_anim_set_values(&fade, LV_OPA_COVER, LV_OPA_TRANSP);
          lv_anim_set_time(&fade, 260);
          lv_anim_set_exec_cb(&fade, [](void *obj, int32_t opacity) {
            lv_obj_set_style_opa((lv_obj_t *) obj, opacity, 0);
          });
          lv_anim_start(&fade);
      - delay: 280ms
      - lambda: |-
          if (id(volume_ring_overlay) != nullptr) {
            lv_obj_add_flag(id(volume_ring_overlay), LV_OBJ_FLAG_HIDDEN);
          }

  - id: album_art_timeout_fallback
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            lambda: 'return !id(sendspin_album_art_valid);'
          then:
            - lvgl.image.update:
                id: album_art_widget
                src: fallback_playing_image
            - lvgl.image.update:
                id: controls_album_art_widget
                src: fallback_playing_image
            - lvgl.image.update:
                id: playlist_album_art_widget
                src: fallback_playing_image
            - lambda: |-
                if (!id(album_art_slide_active)) {
                  lv_obj_add_flag(id(album_art_transition_widget), LV_OBJ_FLAG_HIDDEN);
                }

  - id: mp_idle_debounce
    mode: restart
    then:
      - delay: 1200ms
      - if:
          condition:
            and:
              - media_player.is_idle: external_media_player
              - lambda: 'return id(ui_phase) != ${ui_phase_player_controls};'
          then:
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_standby}

  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: 'return sound_file == "ready_sound";'
          then:
            - lambda: 'id(boot_announce_active) = true;'

      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true

      - lambda: |-
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("audio-file://" + sound_file)
              .set_announcement(true)
              .perform();
          }

