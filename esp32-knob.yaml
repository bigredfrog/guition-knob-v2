# - Rotary encoder uses GPIO_KNOB_A/GPIO2 and GPIO_KNOB_B/GPIO1 from the vendor demo pin map.
# - DRV2605L haptic feedback is configured on the touch I2C bus at 0x5A. HAPTIC_EN/TRIG
# - RGB ring/chain is enabled as a default-off Home Assistant light on RGB_DATA/GPIO0.
#   GPIO0 is a boot/strapping pin, so keep startup state off while testing.
    