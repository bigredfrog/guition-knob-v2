substitutions:
  name: esp32-knob
  friendly_name: ESP-32-KNOB

  # User settings

  startup_sound_file: Home_Connected # options are: Home_Connected or Home_Connected_Male
  imagemodel: "HA-character" # options are: AlbertQuackmore, Alita, Casita, Gwen, HA-character, ha-girl, Hacker, Salem, Sarah, Shaun

  # Home Assistant weather entity.
  ha_weather_entity: weather.forecast_home

  display_model: "JC3636W518V2"
  pdm_mic_type: "true"

  imagewidth:  "360"
  imageheight: "360"

  screenwidth:  "360"
  screenheight: "360"

  media_sample_rate: 48000
  ui_phase_standby: "0"
  ui_phase_player_controls: "1"
  ui_phase_now_playing: "2"
  ui_phase_playlist_menu: "3"

spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO11
  data_pins: [GPIO13, GPIO14, GPIO15, GPIO16]

i2c:
  id: touchscreen_bus
  sda: GPIO9
  scl: GPIO10

external_components:
  - source: github://pr#16057
    components: [generic_image, sendspin]
  - source: github://RAR/esphome-drv2605
    components: [drv2605]
    refresh: 1h
  - source: github://stuartparmenter/ddp-esphome@main
    components: [ddp, ddp_canvas]
    refresh: 1h    

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  name_add_mac_suffix: true
  project:
    name: realdeco.sendspin_guition
    version: "2026.5.0"
  on_boot:
    priority: -100
    then:
      - script.execute:
          id: set_ui_phase
          phase: ${ui_phase_standby}
      - script.execute: refresh_playlist_labels
      - script.execute: apply_accent_color_debounced
      - script.execute: led_ring_apply_state

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  level: WARN

# Core DDP component - handles UDP reception and protocol
ddp:
  id: ddp_server
  port: 4048

# Canvas renderer - renders DDP stream to LVGL canvas
ddp_canvas:
  - id: canvas_renderer_1
    ddp_id: ddp_server
    stream: 1
    canvas: canvas_main
    width: 128
    height: 128
    back_buffers: 2
    receiving:
      id: ddp_receiving
      name: "Stream 1 Active"

api:
  on_client_connected:
    - lambda: |-
        if (!id(boot_sound_played)) {
          id(boot_sound_played) = true;
          if (id(startup_sound_switch).state) {
            id(play_sound)->execute(true, std::string("ready_sound"));
          }
        }
ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:

  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password
  use_address: 192.168.1.28
  on_connect:
    - delay: 1s
    - if:
        condition:
          switch.is_on: standby_background_enabled
        then:
          - script.execute: load_standby_background
  ap:

improv_serial:

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false
  
captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

globals:
  - id: sendspin_album_art_valid
    type: bool
    restore_value: no
    initial_value: "false"
  - id: album_art_slide_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"
  - id: boot_announce_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: weather_available
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ui_phase
    type: int
    restore_value: no
    initial_value: "${ui_phase_standby}"
  - id: touch_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: touch_swipe_detected
    type: bool
    restore_value: no
    initial_value: "false"
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_start_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_last_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_last_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: preferred_screen_brightness
    type: float
    restore_value: yes
    initial_value: "1.0"
  - id: screen_timeout_dimmed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: haptic_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: volume_ring_overlay
    type: lv_obj_t*
    restore_value: no
    initial_value: "nullptr"
  - id: volume_ring_label
    type: lv_obj_t*
    restore_value: no
    initial_value: "nullptr"
  - id: accent_red
    type: int
    restore_value: yes
    initial_value: "255"
  - id: accent_green
    type: int
    restore_value: yes
    initial_value: "255"
  - id: accent_blue
    type: int
    restore_value: yes
    initial_value: "0"

image:
  - file: https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/${imagemodel}/360x360/playing.png
    id: fallback_playing_image
    resize: ${imageheight}x${imageheight}
    type: RGB565
    dither: NONE

generic_image:
  - platform: sendspin
    id: sendspin_album_art
    format: jpeg
    type: RGB565
    resize: ${imageheight}x${imageheight}
    source: ALBUM
    on_image_display:
      - script.stop: album_art_timeout_fallback
      - lambda: |-
          id(sendspin_album_art_valid) = true;
      - if:
          condition:
            lambda: 'return !id(album_art_slide_active);'
          then:
            - script.execute: album_art_apply_decoded
    on_image_error:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
          if (!id(album_art_slide_active)) {
            lv_obj_add_flag(id(album_art_transition_widget), LV_OBJ_FLAG_HIDDEN);
          }
      - lvgl.image.update:
          id: album_art_widget
          src: fallback_playing_image
      - lvgl.image.update:
          id: controls_album_art_widget
          src: fallback_playing_image
      - lvgl.image.update:
          id: playlist_album_art_widget
          src: fallback_playing_image

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

drv2605:
  id: haptic_driver
  i2c_id: touchscreen_bus
  address: 0x5A
  motor_type: LRA
  library: 6

audio_file:
  - id: ready_sound
    file: https://github.com/RealDeco/xiaozhi-esphome/raw/main/sounds/${startup_sound_file}.flac

http_request:

online_image:
  - id: standby_background_image
    url: https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Other/360x360/clock.png
    format: PNG
    type: RGB565
    resize: ${imagewidth}x${imageheight}
    update_interval: never
    on_download_finished:
      - if:
          condition:
            switch.is_on: standby_background_enabled
          then:
            - lvgl.image.update:
                id: standby_background_widget
                src: standby_background_image
            - lambda: |-
                lv_obj_clear_flag(id(standby_background_widget), LV_OBJ_FLAG_HIDDEN);

switch:
  - platform: gpio
    name: Speaker Enable
    icon: "mdi:speaker"
    entity_category: config
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: startup_sound_switch
    name: Startup sound
    icon: "mdi:card-text-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: rotary_haptic_feedback_enabled
    name: Rotary haptic feedback
    icon: "mdi:vibrate"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: led_ring_enabled
    name: LED ring
    icon: "mdi:led-strip-variant"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: led_ring_apply_state
    on_turn_off:
      - light.turn_off: rgb_ring

  - platform: template
    id: standby_screen_timeout_enabled
    name: Standby screen timeout
    icon: "mdi:monitor-off"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: standby_screen_activity
    on_turn_off:
      - script.execute: standby_screen_activity

  - platform: template
    id: standby_background_enabled
    name: Standby clock background
    icon: "mdi:image-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: load_standby_background
    on_turn_off:
      - lambda: |-
          lv_obj_add_flag(id(standby_background_widget), LV_OBJ_FLAG_HIDDEN);
      - online_image.release: standby_background_image

number:
  - platform: template
    id: player_controls_timeout_seconds
    name: Player controls timeout delay
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    mode: box
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 5
    set_action:
      - if:
          condition:
            lambda: 'return id(ui_phase) == ${ui_phase_player_controls};'
          then:
            - script.execute: player_controls_timeout

  - platform: template
    id: standby_screen_timeout_seconds
    name: Standby screen timeout delay
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    mode: box
    min_value: 15
    max_value: 3600
    step: 5
    initial_value: 60
    set_action:
      - script.execute: standby_screen_activity

select:
  - platform: template
    id: standby_background_choice
    name: Standby clock background image
    icon: "mdi:image-multiple-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: clock
    options:
      - chip
      - clock
      - hacker
      - mission
      - starrysky
      - tron
      - waterdrops
      - waves
    set_action:
      - script.execute: standby_screen_activity
      - if:
          condition:
            switch.is_on: standby_background_enabled
          then:
            - online_image.set_url:
                id: standby_background_image
                url: !lambda |-
                  return "https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Other/360x360/" + x + ".png";

  - platform: template
    id: accent_color_preset
    name: Accent color preset
    icon: "mdi:palette"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: Pitch Black
    options:
      - Pitch Black
      - Burning Red
      - Cyber Blue
    set_action:
      - if:
          condition:
            lambda: return x == "Pitch Black";
          then:
            - light.turn_on:
                id: accent_color_picker
                brightness: 100%
                red: 100%
                green: 100%
                blue: 0%
      - if:
          condition:
            lambda: return x == "Burning Red";
          then:
            - light.turn_on:
                id: accent_color_picker
                brightness: 100%
                red: 100%
                green: 0%
                blue: 0%
      - if:
          condition:
            lambda: return x == "Cyber Blue";
          then:
            - light.turn_on:
                id: accent_color_picker
                brightness: 100%
                red: 40%
                green: 80%
                blue: 100%

