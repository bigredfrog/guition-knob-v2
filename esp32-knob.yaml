i2s_audio:
  # New 1.85" knob board:
  #   Speaker/PCM5100A: WS GPIO45, BCK GPIO3, DO GPIO42, no MCLK
  #   PDM mic: SCK GPIO5, DATA GPIO4
  #
  # PDM mic uses GPIO5 as clock and GPIO4 as data; no LRCLK/WS pin is routed for mic input.
  - id: i2s_mic
    i2s_bclk_pin: GPIO5

  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO3

microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_audio_id: i2s_mic
    i2s_din_pin: GPIO4
    adc_type: external
    channel: left
    pdm: ${pdm_mic_type}
    sample_rate: 16000
    bits_per_sample: 16bit
    
speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO42
    dac_type: external
    channel: stereo
    buffer_duration: 300ms

  - platform: mixer
    id: mixing_speaker
    output_speaker: box_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: ${media_sample_rate}
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: ${media_sample_rate}
    bits_per_sample: 16
    
media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: audio_http
    id: http_announcement_source
  - platform: audio_http
    id: http_media_source
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: Sendspin Group Media Player

  - platform: speaker_source
    id: external_media_player
    name: Media Player

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: ${media_sample_rate}
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source

    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: ${media_sample_rate}
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85

    on_play:
      then:
        - script.stop: mp_idle_debounce
        - script.execute: led_ring_apply_state
        - if:
            condition:
              lambda: 'return id(ui_phase) == ${ui_phase_player_controls};'
            then:
              - script.execute:
                  id: set_ui_phase
                  phase: ${ui_phase_player_controls}
            else:
              - script.execute:
                  id: set_ui_phase
                  phase: ${ui_phase_now_playing}

    on_announcement:
      then:
        - if:
            condition:
              lambda: 'return id(boot_announce_active);'
            then:
              - lvgl.page.show: boot_sound_page
              - delay: 2s
              - script.execute:
                  id: set_ui_phase
                  phase: !lambda 'return id(ui_phase);'
              - lambda: 'id(boot_announce_active) = false;'

    on_idle:
      then:
        - script.execute: mp_idle_debounce
        - script.execute: led_ring_apply_state

    on_pause:
      then:
        - script.execute: led_ring_apply_state
        - script.execute:
            id: set_ui_phase
            phase: ${ui_phase_player_controls}

binary_sensor:
  - platform: template
    id: ddp_stream_active
    name: "DDP Stream Active"
    internal: true
    lambda: 'return id(ddp_receiving).state;'
    on_state:
      then:
        - lambda: |-
            if (x) {
              lv_obj_clear_flag(id(canvas_main), LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_add_flag(id(canvas_main), LV_OBJ_FLAG_HIDDEN);
            }

  - platform: gpio
    id: rotary_cw_pulse
    internal: true
    pin:
      number: GPIO1
      mode:
        input: true
        pullup: true
    use_interrupt: false
    filters:
      - delayed_on_off: 2ms
    on_press:
      then:
        - logger.log:
            level: WARN
            tag: rotary
            format: "GPIO1 CW pulse"
        - script.execute: standby_screen_activity
        - media_player.volume_up: external_media_player
        - script.execute: haptic_click
        - script.execute: show_rotary_volume_feedback

  - platform: gpio
    id: rotary_ccw_pulse
    internal: true
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
    use_interrupt: false
    filters:
      - delayed_on_off: 2ms
    on_press:
      then:
        - logger.log:
            level: WARN
            tag: rotary
            format: "GPIO2 CCW pulse"
        - script.execute: standby_screen_activity
        - media_player.volume_down: external_media_player
        - script.execute: haptic_click
        - script.execute: show_rotary_volume_feedback

sensor:
  - platform: homeassistant
    id: ha_weather_temperature
    entity_id: ${ha_weather_entity}
    attribute: temperature
  - platform: homeassistant
    id: ha_weather_wind_speed
    entity_id: ${ha_weather_entity}
    attribute: wind_speed

text_sensor:
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: ${ha_weather_entity}
    on_value:
      - lambda: |-
          const char* icon = "\U000F0590";
          auto c = id(ha_weather_condition).state;
          if (c == "sunny" || c == "clear") {
            icon = "\U000F0599";
          } else if (c == "partlycloudy") {
            icon = "\U000F0595";
          } else if (c == "cloudy") {
            icon = "\U000F0590";
          } else if (c == "rainy") {
            icon = "\U000F0597";
          } else if (c == "pouring") {
            icon = "\U000F0596";
          } else if (c == "snowy") {
            icon = "\U000F0598";
          } else if (c == "lightning") {
            icon = "\U000F0593";
          } else if (c == "hail") {
            icon = "\U000F0592";
          }
          lv_label_set_text(id(weather_icon_glow), icon);
          lv_label_set_text(id(weather_icon), icon);
  - platform: homeassistant
    id: ha_weather_temperature_unit
    entity_id: ${ha_weather_entity}
    attribute: temperature_unit

  - platform: homeassistant
    id: ha_weather_wind_speed_unit
    entity_id: ${ha_weather_entity}
    attribute: wind_speed_unit

  - platform: sendspin
    id: sendspin_title
    type: title
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - script.execute: album_art_timeout_fallback
      - component.update: now_playing_text
      - lvgl.label.update:
          id: controls_title_label
          text: !lambda return x;

  - platform: sendspin
    id: sendspin_artist
    type: artist
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - script.execute: album_art_timeout_fallback
      - component.update: now_playing_text
      - lvgl.label.update:
          id: controls_artist_label
          text: !lambda return x;

  - platform: template
    id: now_playing_text
    update_interval: never
    lambda: |-
      std::string s = id(sendspin_title).get_state();
      auto a = id(sendspin_artist).get_state();
      if (!a.empty()) {
        if (!s.empty()) s += " - ";
        s += a;
      }
      return s;
    on_value:
      - lvgl.label.update:
          id: now_playing_label
          text: !lambda return x;

  - platform: template
    id: clock_hms
    update_interval: 1s
    lambda: |-
      auto t = id(homeassistant_time).now();
      if (!t.is_valid()) return std::string("--:--:--");
      bool hide_colons = ((t.second % 2) == 0);
      char buf[9];
      if (hide_colons) snprintf(buf, sizeof(buf), "%02d %02d %02d", t.hour, t.minute, t.second);
      else snprintf(buf, sizeof(buf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: clock_label
                text: !lambda return x;

  - platform: template
    id: clock_date
    update_interval: 30s
    lambda: |-
      auto t = id(homeassistant_time).now();
      if (!t.is_valid()) return std::string("------");
      static const char* months[] = {
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      };
      const char* mon = (t.month >= 1 && t.month <= 12) ? months[t.month - 1] : "???";
      char buf[32];
      snprintf(buf, sizeof(buf), "%d %s", t.day_of_month, mon);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: date_label
                text: !lambda return x;

  - platform: template
    id: weather_temp_big
    update_interval: 15s
    lambda: |-
      if (!id(ha_weather_temperature).has_state()) return std::string("--");
      std::string tunit = id(ha_weather_temperature_unit).state.c_str();
      if (tunit.empty()) tunit = "°C";
      lv_label_set_text(id(weather_big_temp_unit), tunit.c_str());
      int ti = (int) lroundf(id(ha_weather_temperature).state);
      char buf[8];
      snprintf(buf, sizeof(buf), "%d", ti);
      return std::string(buf);
    on_value:
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.label.update:
                id: weather_big_temp
                text: !lambda return x;

  - platform: template
    id: weather_line
    update_interval: 15s
    lambda: |-
      if (!id(ha_weather_temperature).has_state() || !id(ha_weather_wind_speed).has_state()) {
        return std::string("Weather unavailable");
      }
      std::string tunit = id(ha_weather_temperature_unit).state.c_str();
      if (tunit.empty()) tunit = "°C";
      std::string wunit = id(ha_weather_wind_speed_unit).state.c_str();
      if (wunit.empty()) wunit = "m/s";
      float temp_c = id(ha_weather_temperature).state;
      float wind_ms = id(ha_weather_wind_speed).state;
      float feels_c = temp_c;
      if (temp_c <= 10.0f && wind_ms > 1.3f) {
        float wind_kmh = wind_ms * 3.6f;
        float v16 = powf(wind_kmh, 0.16f);
        feels_c = 13.12f + 0.6215f * temp_c - 11.37f * v16 + 0.3965f * temp_c * v16;
      }
      char buf[160];
      snprintf(buf, sizeof(buf),
               "Temp: %.1f%s  -  Feels like: %.1f%s  -  Wind speed: %.1f %s",
               temp_c, tunit.c_str(),
               feels_c, tunit.c_str(),
               wind_ms, wunit.c_str());
      return std::string(buf);
    on_value:
      - lambda: |-
          id(weather_available) = (x != "Weather unavailable");
      - if:
          condition:
            and:
              - lvgl.page.is_showing: idle_page
              - lambda: return id(weather_available);
          then:
            - lvgl.widget.show: weather_header
            - lvgl.widget.show: weather_label
            - lvgl.label.update:
                id: weather_label
                text: !lambda return x;
          else:
            - if:
                condition:
                  lvgl.page.is_showing: idle_page
                then:
                  - lvgl.widget.hide: weather_header
                  - lvgl.widget.hide: weather_label

